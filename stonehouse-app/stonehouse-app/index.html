<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Stonehouse Café — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ───────────────────────────────── */
:root{
  --bg:        #f7f4ef;
  --surface:   #ffffff;
  --surface2:  #f0ede6;
  --ink:       #1a1612;
  --ink2:      #4a4540;
  --ink3:      #8a8278;
  --gold:      #b8922a;
  --gold-bg:   #fdf5e4;
  --green:     #2c4a22;
  --green-bg:  #eef4eb;
  --border:    #e2ddd5;
  --border2:   #cfc9bf;
  --red:       #c0392b;
  --r:         12px;
  --r-sm:      8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ── COVER ────────────────────────────────── */
#coverPage{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#141210;position:relative;overflow:hidden;padding:32px 20px;
}
#coverPage::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 65% 40%,rgba(184,146,42,.13) 0%,transparent 55%),
             radial-gradient(ellipse at 20% 75%,rgba(44,74,34,.2) 0%,transparent 50%);
}
.cv-frame{
  position:relative;z-index:1;
  border:1px solid rgba(184,146,42,.25);
  padding:clamp(32px,7vw,56px) clamp(28px,8vw,72px);
  text-align:center;max-width:480px;width:100%;
}
.cv-frame::before,.cv-frame::after{
  content:'';position:absolute;width:18px;height:18px;
  border-color:var(--gold);border-style:solid;opacity:.6;
}
.cv-frame::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.cv-frame::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.cv-est{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(184,146,42,.6);font-weight:500;margin-bottom:20px;}
.cv-logo{font-family:'Playfair Display',serif;font-size:clamp(44px,11vw,68px);font-weight:700;color:#f5f0e8;line-height:1;letter-spacing:-1px;}
.cv-logo em{color:var(--gold);font-style:normal;}
.cv-tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(14px,4vw,18px);color:rgba(255,255,255,.35);margin:8px 0 28px;font-weight:400;}
.cv-pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:32px;}
.cv-pill{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 10px;}
.cv-btn{
  background:var(--gold);color:#141210;border:none;border-radius:6px;
  padding:14px 36px;font-family:'Inter',sans-serif;font-size:12px;
  font-weight:600;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 20px rgba(184,146,42,.35);display:inline-flex;align-items:center;gap:8px;
}
.cv-btn:hover{background:#cc a83a;transform:translateY(-1px);box-shadow:0 6px 28px rgba(184,146,42,.45);}
.cv-footer{margin-top:24px;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px;}

/* ── APP SHELL ────────────────────────────── */
#app{display:none;flex-direction:column;min-height:100vh;}
#app.open{display:flex;}

/* ── BOTTOM TAB BAR ───────────────────────── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--ink);border-top:1px solid rgba(255,255,255,.07);
  display:flex;padding-bottom:env(safe-area-inset-bottom,0);
  box-shadow:0 -4px 20px rgba(0,0,0,.25);
}
.tb-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:10px 4px 12px;cursor:pointer;
  border:none;background:none;gap:3px;transition:opacity .15s;
  position:relative;
}
.tb-icon{font-size:22px;line-height:1;}
.tb-label{font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);font-family:'Inter',sans-serif;transition:color .2s;}
.tb-item.active .tb-label{color:var(--gold);}
.tb-badge{
  position:absolute;top:7px;right:calc(50% - 18px);
  background:var(--gold);color:#141210;font-size:9px;font-weight:700;
  border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;
  display:none;font-family:'Inter',sans-serif;
}
.tb-badge.show{display:block;}

/* ── PAGES ────────────────────────────────── */
.pages{flex:1;padding-bottom:62px;}
.page{display:none;min-height:calc(100vh - 62px);animation:pgIn .25s ease;}
.page.active{display:block;}
@keyframes pgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ── TOP BAR (shared) ─────────────────────── */
.topbar{
  background:var(--ink);padding:14px 16px;display:flex;
  align-items:center;gap:12px;position:sticky;top:0;z-index:100;
}
.topbar-back{
  background:none;border:none;color:var(--gold);cursor:pointer;
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;
  font-family:'Inter',sans-serif;padding:4px 0;flex-shrink:0;white-space:nowrap;
}
.topbar-back svg{width:16px;height:16px;fill:none;stroke:var(--gold);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.topbar-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#f5f0e8;flex:1;}
.topbar-icon{font-size:20px;}

/* ── HOME PAGE ────────────────────────────── */
.home-header{background:var(--ink);padding:20px 16px 24px;text-align:center;position:relative;overflow:hidden;}
.home-header::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 50%,rgba(184,146,42,.1) 0%,transparent 60%);}
.home-logo{font-family:'Playfair Display',serif;font-size:clamp(28px,6vw,38px);font-weight:700;color:#f5f0e8;position:relative;z-index:1;letter-spacing:-.5px;}
.home-logo em{color:var(--gold);font-style:normal;}
.home-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:4px;position:relative;z-index:1;}

.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);}
@media(min-width:480px){.cat-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:720px){.cat-grid{grid-template-columns:repeat(4,1fr);}}

.cat-card{
  background:var(--surface);padding:20px 12px 18px;display:flex;
  flex-direction:column;align-items:center;gap:8px;cursor:pointer;
  transition:background .15s;text-align:center;min-height:100px;
  border:none;width:100%;
}
.cat-card:hover,.cat-card:active{background:#f5f2ec;}
.cat-emoji{font-size:28px;line-height:1;}
.cat-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);line-height:1.2;}
.cat-count{font-size:10px;color:var(--ink3);font-weight:400;}

/* ── SECTION PAGE ─────────────────────────── */
.search-bar{background:var(--surface);padding:10px 16px;border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:99;}
.search-inner{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 13px;max-width:700px;margin:0 auto;}
.search-inner input{border:none;background:none;outline:none;font-family:'Inter',sans-serif;font-size:13px;color:var(--ink);flex:1;min-width:0;}
.search-inner input::placeholder{color:var(--ink3);}
.search-icon{font-size:14px;color:var(--ink3);flex-shrink:0;}

.section-hero{padding:22px 16px 18px;border-bottom:1px solid var(--border);max-width:700px;margin:0 auto;}
.section-hero h1{font-family:'Playfair Display',serif;font-size:clamp(26px,6vw,36px);font-weight:700;color:var(--ink);}
.section-hero p{font-size:13px;color:var(--ink3);margin-top:4px;font-style:italic;}
.section-rule{display:flex;align-items:center;gap:10px;margin-top:12px;}
.section-rule span{flex:1;max-width:50px;height:1px;background:var(--gold);opacity:.5;}
.section-rule i{font-size:8px;color:var(--gold);opacity:.7;font-style:normal;}

.sub-label{
  padding:12px 16px 8px;
  font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--ink3);font-weight:600;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  max-width:700px;margin:0 auto;
  display:block;
}

/* ── MENU ITEM ROW ────────────────────────── */
.mrow{
  display:flex;align-items:flex-start;padding:14px 16px;
  border-bottom:1px solid var(--border);gap:12px;
  background:var(--surface);transition:background .12s;
  max-width:700px;margin:0 auto;
}
.mrow:hover{background:#fdfbf7;}
.mrow.in-cart{background:var(--green-bg);}
.mrow-body{flex:1;min-width:0;}
.mrow-name-line{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.mrow-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);line-height:1.25;}
.mrow.in-cart .mrow-name{color:var(--green);}
.mrow-desc{font-size:12.5px;color:var(--ink3);line-height:1.55;font-style:italic;}
.mrow-note{font-size:11px;color:var(--gold);margin-top:3px;font-style:normal;font-weight:500;}
.tag{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;font-family:'Inter',sans-serif;flex-shrink:0;}
.tag-v{background:rgba(44,74,34,.1);color:var(--green);border:1px solid rgba(44,74,34,.2);}
.tag-popular{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(184,146,42,.25);}
.tag-spicy{background:#fef0ec;color:#c0392b;border:1px solid rgba(192,57,43,.2);}

.mrow-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;padding-top:1px;}
.mrow-price{font-size:15px;font-weight:700;color:var(--ink);font-family:'Inter',sans-serif;white-space:nowrap;}

.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qbtn{
  width:26px;height:26px;border-radius:var(--r-sm);
  border:1.5px solid var(--border2);background:var(--surface);
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--ink);transition:all .12s;line-height:1;
}
.qbtn:hover{background:var(--gold);border-color:var(--gold);color:#fff;}
.qbtn:active{transform:scale(.92);}
.qbtn.add{background:var(--green);border-color:var(--green);color:#fff;}
.qbtn.add:hover{background:#3a6030;}
.qnum{font-weight:700;font-size:14px;min-width:16px;text-align:center;color:var(--ink);font-family:'Inter',sans-serif;}

.no-results{text-align:center;padding:52px 20px;color:var(--ink3);}
.no-results h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--ink);margin-bottom:6px;}
.no-results p{font-size:13px;}

/* ── ORDER PAGE ───────────────────────────── */
.order-wrap{max-width:600px;margin:0 auto;padding:16px 16px 32px;}

.order-empty{text-align:center;padding:56px 20px;}
.order-empty-icon{font-size:52px;opacity:.35;margin-bottom:16px;}
.order-empty h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);margin-bottom:8px;}
.order-empty p{font-size:13px;color:var(--ink3);line-height:1.6;}
.btn-ghost{
  margin-top:20px;display:inline-flex;align-items:center;gap:6px;
  background:var(--ink);color:var(--gold);border:none;border-radius:var(--r-sm);
  padding:12px 24px;font-size:11px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s;
}
.btn-ghost:hover{background:#2a2010;}

/* Save order form */
.save-form-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.save-form-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-row:last-of-type{margin-bottom:0;}
.form-label{font-size:11px;font-weight:600;color:var(--ink2);letter-spacing:.5px;}
.form-input{
  background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);
  padding:10px 13px;font-size:13px;font-family:'Inter',sans-serif;color:var(--ink);
  outline:none;transition:border-color .2s;width:100%;
}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--ink3);}

/* Order lines */
.order-lines-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.order-line{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;}
.order-line:last-child{border-bottom:none;}
.ol-info{flex:1;min-width:0;}
.ol-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:1px;}
.ol-unit{font-size:11px;color:var(--ink3);}
.ol-sub{font-weight:700;font-size:13px;min-width:54px;text-align:right;font-family:'Inter',sans-serif;color:var(--ink);}

.totals-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;}
.total-row{display:flex;justify-content:space-between;font-size:13px;color:var(--ink3);margin-bottom:8px;font-family:'Inter',sans-serif;}
.total-grand{display:flex;justify-content:space-between;font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--ink);padding-top:12px;margin-top:4px;border-top:1px solid var(--border);}
.total-grand span:last-child{color:var(--green);}

/* Action buttons */
.actions-row{display:flex;flex-direction:column;gap:10px;}
.btn-primary{width:100%;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);padding:15px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .2s;box-shadow:0 4px 14px rgba(44,74,34,.3);}
.btn-primary:hover{background:#3a6030;}
.btn-danger{width:100%;background:none;color:var(--red);border:1.5px solid rgba(192,57,43,.25);border-radius:var(--r-sm);padding:12px;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-danger:hover{background:#fff0ef;border-color:var(--red);}

/* ── RECEIPT PAGE ─────────────────────────── */
.receipt-page-wrap{max-width:440px;margin:0 auto;padding:20px 16px 40px;}

.receipt-paper{
  background:#fff;
  box-shadow:0 2px 20px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
  border-radius:4px;overflow:hidden;margin-bottom:18px;
}
.receipt-foil{height:5px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 12px,#f5e9c0 12px,#f5e9c0 16px,var(--gold) 16px,var(--gold) 18px,transparent 18px,transparent 22px);}
.receipt-head{padding:22px 22px 18px;text-align:center;border-bottom:1px dashed var(--border);}
.r-logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.5px;}
.r-logo em{color:var(--gold);font-style:normal;}
.r-est{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--ink3);display:block;margin-top:2px;font-family:'Inter',sans-serif;}
.r-divider{width:36px;height:1px;background:var(--gold);margin:12px auto;opacity:.5;}
.r-order-no{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.5px;font-family:'Inter',sans-serif;}
.r-datetime{font-size:11px;color:var(--ink3);margin-top:2px;font-family:'Inter',sans-serif;}
.r-customer{font-size:12px;color:var(--ink2);margin-top:6px;font-family:'Inter',sans-serif;font-style:italic;}

.receipt-items{padding:14px 22px;border-bottom:1px dashed var(--border);}
.r-col-head{display:grid;grid-template-columns:1fr 36px 62px;gap:6px;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:4px;font-family:'Inter',sans-serif;}
.r-col-head span:nth-child(2),.r-col-head span:nth-child(3){text-align:right;}
.r-item{display:grid;grid-template-columns:1fr 36px 62px;gap:6px;align-items:baseline;padding:8px 0;border-bottom:1px dotted rgba(0,0,0,.07);}
.r-item:last-child{border-bottom:none;}
.r-iname{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;}
.r-iqty{font-size:12px;color:var(--ink3);text-align:right;font-family:'Inter',sans-serif;}
.r-iamt{font-size:13px;font-weight:600;color:var(--ink);text-align:right;font-family:'Inter',sans-serif;}

.receipt-total{padding:14px 22px;border-bottom:1px dashed var(--border);}
.r-trow{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:8px;font-family:'Inter',sans-serif;}
.r-grand{display:flex;justify-content:space-between;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink);padding-top:10px;border-top:1px solid var(--border);}
.r-grand span:last-child{color:var(--green);}

.receipt-foot{padding:16px 22px 20px;text-align:center;}
.receipt-foot p{font-size:12px;color:var(--ink3);line-height:1.6;font-style:italic;font-family:'Playfair Display',serif;}
.receipt-hashtag{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-top:8px;display:block;font-family:'Inter',sans-serif;}

.receipt-tear{height:12px;background:radial-gradient(circle at top,var(--bg) 7px,#fff 7px);background-size:20px 12px;background-position:bottom;background-repeat:repeat-x;margin-top:-1px;}

.counter-box{background:var(--ink);border-radius:var(--r);padding:18px 20px;text-align:center;margin-bottom:14px;}
.counter-box .cb-icon{font-size:28px;margin-bottom:8px;}
.counter-box h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);margin-bottom:6px;}
.counter-box p{font-size:12px;color:rgba(255,255,255,.5);line-height:1.7;font-family:'Inter',sans-serif;}
.btn-new-order{width:100%;background:var(--gold);color:#141210;border:none;border-radius:var(--r-sm);padding:14px;font-size:11px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.btn-new-order:hover{background:#cca83a;}

/* ── TOAST ────────────────────────────────── */
.toast{
  position:fixed;top:14px;left:50%;
  transform:translateX(-50%) translateY(-70px);
  background:var(--ink);color:#fff;padding:10px 20px;border-radius:40px;
  font-size:12px;font-weight:500;z-index:999;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;border:1px solid rgba(184,146,42,.3);
  box-shadow:0 6px 20px rgba(0,0,0,.25);pointer-events:none;
  font-family:'Inter',sans-serif;letter-spacing:.3px;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── DIVIDER helper ───────────────────────── */
.section-divider{height:8px;background:var(--bg);}
</style>
</head>
<body>

<!-- COVER -->
<div id="coverPage">
  <div class="cv-frame">
    <div class="cv-est">Est. 2019 · Hillcrest, KwaZulu-Natal</div>
    <div class="cv-logo">Stone<em>house</em></div>
    <div class="cv-tagline">The Café</div>
    <div class="cv-pills">
      <span class="cv-pill">All Day Breakfast</span>
      <span class="cv-pill">Burgers</span>
      <span class="cv-pill">Waffles</span>
      <span class="cv-pill">Coffee</span>
      <span class="cv-pill">Kids Welcome</span>
    </div>
    <button class="cv-btn" onclick="APP.openMenu()">View Menu &rarr;</button>
    <div class="cv-footer">#GoodForKids &nbsp;·&nbsp; Service with a Smile</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="pages">

    <!-- HOME -->
    <div class="page active" id="page-home">
      <div class="home-header">
        <div class="home-logo">Stone<em>house</em></div>
        <div class="home-sub">The Café · Full Menu</div>
      </div>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <!-- SECTION -->
    <div class="page" id="page-section">
      <div class="topbar" id="sectionTopbar">
        <button class="topbar-back" onclick="APP.goHome()">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Menu
        </button>
        <div class="topbar-title" id="secTitle">Section</div>
        <div class="topbar-icon" id="secIcon">🍳</div>
      </div>
      <div class="search-bar">
        <div class="search-inner">
          <span class="search-icon">🔍</span>

const APP = (function(){

  // ── State ──────────────────────────────────
  let cart = {};
  let currentSection = null;
  let searchQ = '';
  let toastTimer = null;

  // ── Helpers ────────────────────────────────
  function findItem(id){
    for(const s of SECTIONS) for(const sub of s.sub){
      const f = sub.items.find(i=>i.id===id);
      if(f) return f;
    }
    return null;
  }

  function cartCount(){
    return Object.values(cart).reduce((s,i)=>s+i.qty,0);
  }

  function cartTotal(){
    return Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0);
  }

  function fmt(n){ return 'R'+n.toFixed(2); }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = '✓ '+msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'),1800);
  }

  // ── Page switching ─────────────────────────
  function showPage(key){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    const pg = document.getElementById('page-'+key);
    if(pg) pg.classList.add('active');
  }

  function activateTab(key){
    document.querySelectorAll('.tb-item').forEach(t=>t.classList.remove('active'));
    const tb = document.getElementById('tab-'+key);
    if(tb) tb.classList.add('active');
  }

  function updateBadge(){
    const n = cartCount();
    const b = document.getElementById('cartBadge');
    b.textContent = n;
    b.classList.toggle('show', n>0);
  }

  // ── Cover ──────────────────────────────────
  function openMenu(){
    document.getElementById('coverPage').style.display='none';
    document.getElementById('app').classList.add('open');
    renderCategoryGrid();
  }

  // ── Home ───────────────────────────────────
  function renderCategoryGrid(){
    const grid = document.getElementById('catGrid');
    grid.innerHTML = SECTIONS.map(s=>{
      const total = s.sub.reduce((n,sub)=>n+sub.items.length,0);
      return `<button class="cat-card" onclick="APP.openSection('${s.key}')">
        <div class="cat-emoji">${s.icon}</div>
        <div class="cat-name">${s.name}</div>
        <div class="cat-count">${total} items</div>
      </button>`;
    }).join('');
  }

  function goHome(){
    showPage('home');
    activateTab('home');
    document.getElementById('tab-section').style.display='none';
  }

  // ── Section ────────────────────────────────
  function openSection(key){
    currentSection = SECTIONS.find(s=>s.key===key);
    if(!currentSection) return;

    searchQ = '';
    const si = document.getElementById('searchInput');
    if(si) si.value='';

    document.getElementById('secTitle').textContent = currentSection.name;
    document.getElementById('secIcon').textContent = currentSection.icon;

    const tabSec = document.getElementById('tab-section');
    document.getElementById('tab-sec-icon').textContent = currentSection.icon;
    document.getElementById('tab-sec-label').textContent = currentSection.name.split(' ')[0];
    tabSec.style.display='flex';

    renderSection();
    showPage('section');
    activateTab('section');
  }

  function renderSection(){
    if(!currentSection){ document.getElementById('sectionBody').innerHTML=''; return; }

    const body = document.getElementById('sectionBody');
    let html = `<div class="section-hero">
      <h1>${currentSection.name}</h1>
      ${currentSection.desc?`<p>${currentSection.desc}</p>`:''}
      <div class="section-rule"><span></span><i>◆</i><span></span></div>
    </div>`;

    let hasAny = false;

    for(const sub of currentSection.sub){
      const filtered = searchQ
        ? sub.items.filter(i=>i.name.toLowerCase().includes(searchQ)||i.desc.toLowerCase().includes(searchQ))
        : sub.items;

      if(searchQ && filtered.length===0) continue;
      hasAny = true;

      if(sub.label){
        html += `<div class="section-divider"></div><div class="sub-label">${sub.label}</div>`;
      }
      for(const item of filtered){
        html += buildRow(item);
      }
    }

    if(searchQ && !hasAny){
      html += `<div class="no-results"><h3>No results for "${searchQ}"</h3><p>Try a different search term</p></div>`;
    }

    body.innerHTML = html;
  }

  // FIX: build full row HTML without relying on outerHTML patching
  function buildRow(item){
    const qty = cart[item.id]?.qty||0;
    const inCart = qty>0;
    const tags = item.tags.map(t=>{
      if(t==='v')       return '<span class="tag tag-v">V</span>';
      if(t==='popular') return '<span class="tag tag-popular">★</span>';
      if(t==='spicy')   return '<span class="tag tag-spicy">🌶</span>';
      return '';
    }).join('');

    const ctrlHtml = qty>0
      ? `<div class="qty-ctrl">
          <button class="qbtn" onclick="APP.qty('${item.id}',-1,event)">−</button>
          <span class="qnum">${qty}</span>
          <button class="qbtn add" onclick="APP.qty('${item.id}',1,event)">+</button>
         </div>`
      : `<div class="qty-ctrl">
          <button class="qbtn add" onclick="APP.qty('${item.id}',1,event)">+</button>
         </div>`;

    return `<div class="mrow${inCart?' in-cart':''}" id="mrow-${item.id}">
      <div class="mrow-body">
        <div class="mrow-name-line">
          <span class="mrow-name">${item.name}</span>
          ${tags}
        </div>
        ${item.desc?`<div class="mrow-desc">${item.desc}</div>`:''}
        ${item.note?`<div class="mrow-note">ℹ ${item.note}</div>`:''}
      </div>
      <div class="mrow-right">
        <div class="mrow-price">${fmt(item.price)}</div>
        <div id="ctrl-${item.id}">${ctrlHtml}</div>
      </div>
    </div>`;
  }

  // FIX: update only the ctrl container innerHTML, not outerHTML
  function patchRowCtrl(id){
    const ctrl = document.getElementById('ctrl-'+id);
    if(!ctrl) return;
    const qty = cart[id]?.qty||0;
    // Also patch row class
    const row = document.getElementById('mrow-'+id);
    if(row) row.classList.toggle('in-cart', qty>0);
    if(row){
      const nm = row.querySelector('.mrow-name');
      if(nm) nm.style.color = qty>0 ? 'var(--green)' : '';
    }
    ctrl.innerHTML = qty>0
      ? `<div class="qty-ctrl">
          <button class="qbtn" onclick="APP.qty('${id}',-1,event)">−</button>
          <span class="qnum">${qty}</span>
          <button class="qbtn add" onclick="APP.qty('${id}',1,event)">+</button>
         </div>`
      : `<div class="qty-ctrl">
          <button class="qbtn add" onclick="APP.qty('${id}',1,event)">+</button>
         </div>`;
  }

  // ── Qty ────────────────────────────────────
  function qty(id, delta, event){
    if(event){ event.preventDefault(); event.stopPropagation(); }
    const item = findItem(id);
    if(!item) return;

    if(!cart[id]) cart[id]={...item,qty:0};
    cart[id].qty = Math.max(0, cart[id].qty+delta);
    if(cart[id].qty===0) delete cart[id];

    if(delta>0) showToast(item.name+' added');

    patchRowCtrl(id);   // FIX: safe patch
    updateBadge();

    // If order page is open, re-render it
    if(document.getElementById('page-order').classList.contains('active')){
      renderOrderPage();
    }
  }

  // ── Order Page ─────────────────────────────
  function renderOrderPage(){
    const items = Object.values(cart);
    const count = cartCount();
    const total = cartTotal();

    document.getElementById('orderCountLabel').textContent = count>0 ? `${count} item${count!==1?'s':''}` : '';

    const wrap = document.getElementById('orderWrap');

    if(items.length===0){
      wrap.innerHTML=`<div class="order-empty">
        <div class="order-empty-icon">🛒</div>
        <h3>Your order is empty</h3>
        <p>Browse the menu and add your favourite items.</p>
        <button class="btn-ghost" onclick="APP.goHome()">Browse Menu</button>
      </div>`;
      return;
    }

    wrap.innerHTML=`
      <div class="save-form-card">
        <div class="save-form-title">Save Your Order Details</div>
        <div class="form-row">
          <label class="form-label">Your Name</label>
          <input class="form-input" id="guestName" type="text" placeholder="e.g. Sarah" maxlength="40" autocomplete="off">
        </div>
        <div class="form-row">
          <label class="form-label">Table Number</label>
          <input class="form-input" id="tableNum" type="text" placeholder="e.g. 5" maxlength="10" autocomplete="off">
        </div>
        <div class="form-row">
          <label class="form-label">Special Requests</label>
          <input class="form-input" id="specialReq" type="text" placeholder="Allergies, preferences…" maxlength="100" autocomplete="off">
        </div>
      </div>

      <div class="order-lines-card">
        ${items.map(item=>`
          <div class="order-line">
            <div class="ol-info">
              <div class="ol-name">${item.name}</div>
              <div class="ol-unit">${fmt(item.price)} each</div>
            </div>
            <div class="qty-ctrl">
              <button class="qbtn" onclick="APP.qty('${item.id}',-1)">−</button>
              <span class="qnum">${item.qty}</span>
              <button class="qbtn add" onclick="APP.qty('${item.id}',1)">+</button>
            </div>
            <div class="ol-sub">${fmt(item.price*item.qty)}</div>
          </div>`).join('')}
      </div>

      <div class="totals-card">
        <div class="total-row"><span>Subtotal (${count} item${count!==1?'s':''})</span><span>${fmt(total)}</span></div>
        <div class="total-grand"><span>Total</span><span>${fmt(total)}</span></div>
      </div>

      <div class="actions-row">
        <button class="btn-primary" onclick="APP.placeOrder()">Place Order →</button>
        <button class="btn-danger" onclick="APP.clearOrder()">🗑 Clear Entire Order</button>
      </div>`;
  }

  // ── Clear Order ────────────────────────────
  function clearOrder(){
    if(!Object.keys(cart).length) return;
    if(!confirm('Clear your entire order?')) return;
    cart = {};
    updateBadge();
    // Re-render section if open
    if(currentSection && document.getElementById('page-section').classList.contains('active')){
      renderSection();
    }
    renderOrderPage();
    showToast('Order cleared');
  }

  // ── Place Order ────────────────────────────
  function placeOrder(){
    const items = Object.values(cart);
    if(!items.length) return;

    // Grab form values safely
    const gName = (document.getElementById('guestName')?.value||'').trim();
    const tNum  = (document.getElementById('tableNum')?.value||'').trim();
    const sReq  = (document.getElementById('specialReq')?.value||'').trim();

    const total = cartTotal();
    const count = cartCount();
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'});
    const timeStr = now.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});
    const orderNo = 'SH-'+Math.floor(1000+Math.random()*9000);

    const customerLine = [gName&&`Name: ${gName}`, tNum&&`Table: ${tNum}`].filter(Boolean).join(' &nbsp;·&nbsp; ');
    const reqLine = sReq ? `<div style="font-size:11px;color:var(--ink3);margin-top:4px;font-style:italic;font-family:'Inter',sans-serif;">Note: ${sReq}</div>` : '';

    document.getElementById('receiptWrap').innerHTML=`
      <div class="receipt-paper">
        <div class="receipt-foil"></div>
        <div class="receipt-head">
          <div class="r-logo">Stone<em>house</em></div>
          <span class="r-est">The Café · Hillcrest · Est. 2019</span>
          <div class="r-divider"></div>
          <div class="r-order-no">${orderNo}</div>
          <div class="r-datetime">${dateStr} · ${timeStr}</div>
          ${customerLine?`<div class="r-customer">${customerLine}</div>`:''}
          ${reqLine}
        </div>

        <div class="receipt-items">
          <div class="r-col-head"><span>Item</span><span>Qty</span><span>Amount</span></div>
          ${items.map(i=>`
            <div class="r-item">
              <div class="r-iname">${i.name}</div>
              <div class="r-iqty">×${i.qty}</div>
              <div class="r-iamt">${fmt(i.price*i.qty)}</div>
            </div>`).join('')}
        </div>

        <div class="receipt-total">
          <div class="r-trow"><span>${count} item${count!==1?'s':''}</span><span>${fmt(total)}</span></div>
          <div class="r-grand"><span>Total</span><span>${fmt(total)}</span></div>
        </div>

        <div class="receipt-foot">
          <p>Thank you for dining with us.<br>We look forward to seeing you again!</p>
          <span class="receipt-hashtag">#GOODFORKIDS · #SERVICEWITHSMILE</span>
        </div>
      </div>
      <div class="receipt-tear"></div>

      <div class="counter-box">
        <div class="cb-icon">🧾</div>
        <h3>Please take your order to the counter</h3>
        <p>Show this slip to our team and confirm your order.<br>We'll get it started right away!</p>
      </div>

      <button class="btn-new-order" onclick="APP.newOrder()">Start New Order</button>`;

    showPage('receipt');
    document.querySelectorAll('.tb-item').forEach(t=>t.classList.remove('active'));
  }

  // ── New Order ──────────────────────────────
  function newOrder(){
    cart={};
    updateBadge();
    if(currentSection) renderSection();
    goHome();
  }

  // ── Tab ────────────────────────────────────
  function tab(key, btn){
    if(key==='order') renderOrderPage();
    if(key==='section' && !currentSection){ goHome(); return; }
    showPage(key);
    document.querySelectorAll('.tb-item').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
  }

  // ── Search ─────────────────────────────────
  function search(val){
    searchQ = val.toLowerCase().trim();
    renderSection();
  }

  // ── Init ───────────────────────────────────
  function init(){
    // nothing needed on load
  }

  // ── Public API ─────────────────────────────
  return { openMenu, goHome, openSection, qty, clearOrder, placeOrder, newOrder, tab, search, init };

})();

// Run
APP.init();
</script>
</body>
</html>
