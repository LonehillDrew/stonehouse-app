<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Stonehouse Café — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4ef;--surface:#fff;--surface2:#f0ede6;
  --ink:#1a1612;--ink2:#4a4540;--ink3:#8a8278;
  --gold:#b8922a;--gold-bg:#fdf5e4;--gold-lt:#e8c96d;
  --green:#2c4a22;--green-bg:#eef4eb;--green-lt:#3a6030;
  --red:#c0392b;--red-bg:#fef0ef;
  --border:#e2ddd5;--border2:#cfc9bf;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-md:0 4px 24px rgba(0,0,0,.12);
  --r:12px;--r-sm:8px;--r-xs:4px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ─── COVER ─────────────────────────────── */
#coverPage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#141210;position:relative;overflow:hidden;padding:32px 20px;}
#coverPage::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 65% 40%,rgba(184,146,42,.13) 0%,transparent 55%),radial-gradient(ellipse at 20% 75%,rgba(44,74,34,.2) 0%,transparent 50%);}
.cv-frame{position:relative;z-index:1;border:1px solid rgba(184,146,42,.25);padding:clamp(32px,7vw,56px) clamp(28px,8vw,72px);text-align:center;max-width:480px;width:100%;}
.cv-frame::before,.cv-frame::after{content:'';position:absolute;width:18px;height:18px;border-color:var(--gold);border-style:solid;opacity:.6;}
.cv-frame::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.cv-frame::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.cv-est{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(184,146,42,.6);font-weight:500;margin-bottom:20px;}
.cv-logo{font-family:'Playfair Display',serif;font-size:clamp(44px,11vw,68px);font-weight:700;color:#f5f0e8;line-height:1;letter-spacing:-1px;}
.cv-logo em{color:var(--gold);font-style:normal;}
.cv-tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(14px,4vw,18px);color:rgba(255,255,255,.35);margin:8px 0 28px;}
.cv-pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:32px;}
.cv-pill{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 10px;}
.cv-btn{background:var(--gold);color:#141210;border:none;border-radius:6px;padding:14px 36px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(184,146,42,.35);}
.cv-btn:hover{background:var(--gold-lt);transform:translateY(-1px);}
.cv-footer{margin-top:24px;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px;}

/* ─── APP SHELL ─────────────────────────── */
#app{display:none;flex-direction:column;min-height:100vh;}
#app.open{display:flex;}

/* ─── PAGES ─────────────────────────────── */
.pages{flex:1;padding-bottom:64px;}
.page{display:none;min-height:calc(100vh - 64px);animation:pgIn .25s ease;}
.page.active{display:block;}
@keyframes pgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ─── TAB BAR ───────────────────────────── */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--ink);border-top:1px solid rgba(255,255,255,.07);display:flex;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -4px 20px rgba(0,0,0,.25);}
.tb-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 12px;cursor:pointer;border:none;background:none;gap:3px;position:relative;}
.tb-icon{font-size:20px;line-height:1;}
.tb-label{font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);font-family:'Inter',sans-serif;transition:color .2s;}
.tb-item.active .tb-label{color:var(--gold);}
.tb-badge{position:absolute;top:7px;right:calc(50% - 18px);background:var(--gold);color:#141210;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;display:none;}
.tb-badge.show{display:block;}

/* ─── TOP BAR ───────────────────────────── */
.topbar{background:var(--ink);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.topbar-back{background:none;border:none;color:var(--gold);cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif;padding:4px 0;flex-shrink:0;}
.topbar-back svg{width:16px;height:16px;fill:none;stroke:var(--gold);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.topbar-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#f5f0e8;flex:1;}
.topbar-icon{font-size:20px;}

/* ─── SHOP HEADER ───────────────────────── */
.shop-header{background:var(--ink);padding:20px 16px 0;position:relative;overflow:hidden;}
.shop-header::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 50%,rgba(184,146,42,.1) 0%,transparent 60%);}
.sh-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sh-logo{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,30px);font-weight:700;color:#f5f0e8;letter-spacing:-.5px;}
.sh-logo em{color:var(--gold);font-style:normal;}
.sh-tagline{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:2px;}
.sh-cart-btn{background:var(--gold);border:none;border-radius:var(--r-sm);padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:#141210;transition:background .2s;flex-shrink:0;}
.sh-cart-btn:hover{background:var(--gold-lt);}
.sh-cart-count{background:#141210;color:var(--gold);border-radius:20px;padding:1px 7px;font-size:10px;font-weight:700;}

/* ─── SEARCH BAR ────────────────────────── */
.search-hero{background:var(--ink);padding:0 16px 16px;position:relative;z-index:1;}
.search-box{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);padding:12px 16px;transition:border-color .2s;}
.search-box:focus-within{border-color:var(--gold);background:rgba(255,255,255,.1);}
.search-box input{flex:1;border:none;background:none;outline:none;font-family:'Inter',sans-serif;font-size:14px;color:#fff;min-width:0;}
.search-box input::placeholder{color:rgba(255,255,255,.35);}
.search-box .si{font-size:16px;color:rgba(255,255,255,.4);}
.search-box .s-clear{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:18px;line-height:1;padding:0;display:none;}
.search-box .s-clear.show{display:block;}

/* ─── FILTER CHIPS ──────────────────────── */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:99;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-inner{display:flex;gap:0;padding:10px 12px;gap:6px;min-width:max-content;}
.f-chip{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface);font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif;}
.f-chip:hover{border-color:var(--gold);color:var(--gold);}
.f-chip.active{background:var(--gold);border-color:var(--gold);color:#fff;}
.f-chip.active-green{background:var(--green);border-color:var(--green);color:#fff;}

/* ─── ACTIVE FILTERS BAR ────────────────── */
.active-filters{background:var(--gold-bg);border-bottom:1px solid rgba(184,146,42,.2);padding:8px 16px;display:none;align-items:center;gap:8px;flex-wrap:wrap;}
.active-filters.show{display:flex;}
.active-filters-label{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.5px;}
.af-tag{display:flex;align-items:center;gap:4px;background:#fff;border:1px solid rgba(184,146,42,.3);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--ink2);font-weight:500;}
.af-tag button{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:14px;line-height:1;padding:0;margin-left:2px;}
.clear-all-btn{margin-left:auto;font-size:11px;color:var(--gold);background:none;border:none;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;text-decoration:underline;}

/* ─── SORT / RESULTS BAR ────────────────── */
.results-bar{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--border);}
.results-count{font-size:12px;color:var(--ink3);font-weight:500;}
.results-count strong{color:var(--ink);}
.sort-select{border:1.5px solid var(--border2);border-radius:var(--r-sm);background:var(--surface);padding:6px 10px;font-size:12px;font-family:'Inter',sans-serif;color:var(--ink2);outline:none;cursor:pointer;}
.sort-select:focus{border-color:var(--gold);}

/* ─── ITEM GRID (ecommerce) ─────────────── */
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px;}
@media(min-width:540px){.shop-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:800px){.shop-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1100px){.shop-grid{grid-template-columns:repeat(5,1fr);}}

.product-card{background:var(--surface);border-radius:var(--r);border:1.5px solid var(--border);overflow:hidden;display:flex;flex-direction:column;transition:all .2s;cursor:default;}
.product-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--gold);}
.product-card.in-cart{border-color:var(--green);}

.pc-img{height:100px;display:flex;align-items:center;justify-content:center;font-size:42px;background:var(--bg);position:relative;flex-shrink:0;}
.pc-img .popular-badge{position:absolute;top:8px;left:8px;background:var(--gold);color:#fff;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:3px;}
.pc-img .spicy-badge{position:absolute;top:8px;right:8px;font-size:14px;}
.pc-img .in-cart-dot{position:absolute;bottom:6px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--green);display:none;}
.product-card.in-cart .in-cart-dot{display:block;}

.pc-body{padding:12px 12px 10px;flex:1;display:flex;flex-direction:column;gap:4px;}
.pc-category{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);}
.pc-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;flex:1;}
.product-card.in-cart .pc-name{color:var(--green);}
.pc-desc{font-size:11px;color:var(--ink3);line-height:1.4;font-style:italic;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pc-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.ptag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.ptag-v{background:rgba(44,74,34,.1);color:var(--green);border:1px solid rgba(44,74,34,.2);}
.ptag-popular{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(184,146,42,.25);}
.ptag-spicy{background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.2);}

.pc-footer{padding:8px 12px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pc-price{font-size:15px;font-weight:700;color:var(--ink);font-family:'Inter',sans-serif;}
.pc-add{background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);width:30px;height:30px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.pc-add:hover{background:var(--green-lt);}
.pc-add:active{transform:scale(.9);}
.pc-qty-row{display:flex;align-items:center;gap:6px;}
.qbtn{width:26px;height:26px;border-radius:var(--r-sm);border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);transition:all .12s;}
.qbtn:hover{background:var(--gold);border-color:var(--gold);color:#fff;}
.qbtn.add{background:var(--green);border-color:var(--green);color:#fff;}
.qbtn.add:hover{background:var(--green-lt);}
.qnum{font-weight:700;font-size:13px;min-width:14px;text-align:center;color:var(--ink);}

/* ─── EMPTY / NO RESULTS ────────────────── */
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;}
.no-results-icon{font-size:48px;margin-bottom:12px;opacity:.4;}
.no-results h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);margin-bottom:8px;}
.no-results p{font-size:13px;color:var(--ink3);}
.no-results button{margin-top:16px;background:var(--ink);color:var(--gold);border:none;border-radius:var(--r-sm);padding:10px 24px;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;}

/* ─── FILTER DRAWER (mobile) ────────────── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px);}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.filter-drawer{position:fixed;bottom:0;left:0;right:0;z-index:501;background:var(--surface);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:85vh;display:flex;flex-direction:column;}
.filter-drawer.open{transform:translateY(0);}
.fd-handle{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 0;}
.fd-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);}
.fd-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
.fd-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink3);line-height:1;}
.fd-body{overflow-y:auto;flex:1;padding:16px 20px;}
.fd-section{margin-bottom:20px;}
.fd-section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.fd-chips{display:flex;flex-wrap:wrap;gap:6px;}
.fd-chip{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface);font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .15s;}
.fd-chip:hover{border-color:var(--gold);}
.fd-chip.active{background:var(--gold);border-color:var(--gold);color:#fff;}

/* Price range */
.price-range-wrap{padding:8px 0 4px;}
.price-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:8px;}
.price-labels strong{color:var(--ink);font-weight:600;}
input[type=range]{width:100%;accent-color:var(--gold);height:4px;cursor:pointer;}
.price-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.pp-btn{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border2);font-size:11px;font-weight:500;color:var(--ink2);cursor:pointer;background:var(--surface);transition:all .15s;}
.pp-btn:hover{border-color:var(--gold);color:var(--gold);}
.pp-btn.active{background:var(--gold);border-color:var(--gold);color:#fff;}

.fd-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;}
.fd-apply{flex:1;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);padding:14px;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;}
.fd-reset{background:none;border:1.5px solid var(--border2);color:var(--ink2);border-radius:var(--r-sm);padding:14px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}

/* ─── QUICK VIEW MODAL ──────────────────── */
.qv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px);}
.qv-overlay.open{opacity:1;pointer-events:all;}
.qv-modal{position:fixed;bottom:0;left:0;right:0;z-index:601;background:var(--surface);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:80vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,20px);}
.qv-modal.open{transform:translateY(0);}
@media(min-width:640px){
  .qv-modal{bottom:auto;top:50%;left:50%;right:auto;transform:translate(-50%,-40%);width:460px;border-radius:16px;max-height:85vh;}
  .qv-modal.open{transform:translate(-50%,-50%);}
}
.qv-handle{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 0;}
.qv-img{height:140px;display:flex;align-items:center;justify-content:center;font-size:64px;background:var(--bg);position:relative;}
.qv-body{padding:20px;}
.qv-cat{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.qv-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.2;}
.qv-desc{font-size:13px;color:var(--ink3);line-height:1.6;font-style:italic;margin-bottom:12px;}
.qv-note{font-size:12px;color:var(--gold);margin-bottom:14px;font-weight:500;}
.qv-price-row{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border);}
.qv-price{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--green);}
.qv-add-row{display:flex;align-items:center;gap:10px;}
.qv-add-btn{background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);padding:12px 22px;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s;}
.qv-add-btn:hover{background:var(--green-lt);}
.qv-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}

/* ─── FAVOURITES HEART ──────────────────── */
.fav-btn{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.85);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .15s;backdrop-filter:blur(4px);}
.fav-btn:hover{transform:scale(1.15);}
.fav-btn.active{background:#fff;}

/* ─── ORDER PAGE ────────────────────────── */
.order-wrap{max-width:600px;margin:0 auto;padding:16px 16px 32px;}
.order-empty{text-align:center;padding:56px 20px;}
.order-empty-icon{font-size:52px;opacity:.35;margin-bottom:16px;}
.order-empty h3{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px;}
.order-empty p{font-size:13px;color:var(--ink3);line-height:1.6;}
.btn-ghost{margin-top:20px;display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:var(--gold);border:none;border-radius:var(--r-sm);padding:12px 24px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;}
.save-form-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.sfc-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-row:last-of-type{margin-bottom:0;}
.form-label{font-size:11px;font-weight:600;color:var(--ink2);letter-spacing:.5px;}
.form-input{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 13px;font-size:13px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;transition:border-color .2s;width:100%;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--ink3);}
.order-lines-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.order-line{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;}
.order-line:last-child{border-bottom:none;}
.ol-emoji{font-size:24px;flex-shrink:0;}
.ol-info{flex:1;min-width:0;}
.ol-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:1px;}
.ol-unit{font-size:11px;color:var(--ink3);}
.ol-sub{font-weight:700;font-size:13px;min-width:54px;text-align:right;font-family:'Inter',sans-serif;}
.totals-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;}
.total-row{display:flex;justify-content:space-between;font-size:13px;color:var(--ink3);margin-bottom:8px;}
.total-grand{display:flex;justify-content:space-between;font-family:'Playfair Display',serif;font-size:19px;font-weight:700;padding-top:12px;margin-top:4px;border-top:1px solid var(--border);}
.total-grand span:last-child{color:var(--green);}
.actions-row{display:flex;flex-direction:column;gap:10px;}
.btn-primary{width:100%;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);padding:15px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .2s;box-shadow:0 4px 14px rgba(44,74,34,.3);}
.btn-primary:hover{background:var(--green-lt);}
.btn-danger{width:100%;background:none;color:var(--red);border:1.5px solid rgba(192,57,43,.25);border-radius:var(--r-sm);padding:12px;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-danger:hover{background:var(--red-bg);border-color:var(--red);}

/* ─── FAVOURITES PAGE ───────────────────── */
.favs-empty{text-align:center;padding:60px 20px;}
.favs-empty-icon{font-size:52px;opacity:.3;margin-bottom:14px;}
.favs-empty h3{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px;}
.favs-empty p{font-size:13px;color:var(--ink3);}

/* ─── RECEIPT ───────────────────────────── */
.receipt-page-wrap{max-width:440px;margin:0 auto;padding:20px 16px 40px;}
.receipt-paper{background:#fff;box-shadow:var(--shadow-md);border-radius:4px;overflow:hidden;margin-bottom:18px;}
.receipt-foil{height:5px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 12px,#f5e9c0 12px,#f5e9c0 16px);}
.receipt-head{padding:22px 22px 18px;text-align:center;border-bottom:1px dashed var(--border);}
.r-logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--ink);}
.r-logo em{color:var(--gold);font-style:normal;}
.r-est{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--ink3);display:block;margin-top:2px;}
.r-divider{width:36px;height:1px;background:var(--gold);margin:12px auto;opacity:.5;}
.r-order-no{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.5px;}
.r-datetime{font-size:11px;color:var(--ink3);margin-top:2px;}
.r-customer{font-size:12px;color:var(--ink2);margin-top:6px;font-style:italic;}
.receipt-items{padding:14px 22px;border-bottom:1px dashed var(--border);}
.r-col-head{display:grid;grid-template-columns:1fr 36px 62px;gap:6px;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.r-col-head span:nth-child(2),.r-col-head span:nth-child(3){text-align:right;}
.r-item{display:grid;grid-template-columns:1fr 36px 62px;gap:6px;align-items:baseline;padding:8px 0;border-bottom:1px dotted rgba(0,0,0,.07);}
.r-item:last-child{border-bottom:none;}
.r-iname{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;}
.r-iqty{font-size:12px;color:var(--ink3);text-align:right;}
.r-iamt{font-size:13px;font-weight:600;color:var(--ink);text-align:right;}
.receipt-total{padding:14px 22px;border-bottom:1px dashed var(--border);}
.r-trow{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:8px;}
.r-grand{display:flex;justify-content:space-between;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink);padding-top:10px;border-top:1px solid var(--border);}
.r-grand span:last-child{color:var(--green);}
.receipt-foot{padding:16px 22px 20px;text-align:center;}
.receipt-foot p{font-size:12px;color:var(--ink3);line-height:1.6;font-style:italic;font-family:'Playfair Display',serif;}
.receipt-hashtag{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-top:8px;display:block;}
.receipt-tear{height:12px;background:radial-gradient(circle at top,var(--bg) 7px,#fff 7px);background-size:20px 12px;background-position:bottom;background-repeat:repeat-x;margin-top:-1px;}
.counter-box{background:var(--ink);border-radius:var(--r);padding:18px 20px;text-align:center;margin-bottom:14px;}
.cb-icon{font-size:28px;margin-bottom:8px;}
.counter-box h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);margin-bottom:6px;}
.counter-box p{font-size:12px;color:rgba(255,255,255,.5);line-height:1.7;}
.btn-new-order{width:100%;background:var(--gold);color:#141210;border:none;border-radius:var(--r-sm);padding:14px;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;}

/* ─── TOAST ─────────────────────────────── */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:40px;font-size:12px;font-weight:500;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;border:1px solid rgba(184,146,42,.3);box-shadow:0 6px 20px rgba(0,0,0,.25);pointer-events:none;font-family:'Inter',sans-serif;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ─── MISC ──────────────────────────────── */
.section-divider{height:6px;background:var(--bg);}
.page-pad{padding-bottom:32px;}
</style>
</head>

/* flatten all items with section info */
const ALL_ITEMS = SECTIONS.flatMap(s=>
  s.sub.flatMap(sub=>sub.items.map(i=>({...i,section:s.key,sectionName:s.name,sectionIcon:s.icon})))
);

/* ════════════════════════════════════════════
   APP
════════════════════════════════════════════ */
const APP=(function(){

  /* ── State ── */
  let cart={}, favs=new Set(), toastTimer=null;
  let filters={ category:'all', tags:[], maxPrice:500, sort:'default', search:'' };
  let drawerDraft={};  // pending changes in drawer

  /* ── Helpers ── */
  const fmt=n=>'R'+n.toFixed(2);
  const findItem=id=>ALL_ITEMS.find(i=>i.id===id);
  const cartCount=()=>Object.values(cart).reduce((s,i)=>s+i.qty,0);
  const cartTotal=()=>Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0);

  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent='✓ '+msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
  }

  function showPage(key){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+key)?.classList.add('active');
  }

  function activateTab(key){
    document.querySelectorAll('.tb-item').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+key)?.classList.add('active');
  }

  /* ── Open menu ── */
  function openMenu(){
    document.getElementById('coverPage').style.display='none';
    document.getElementById('app').classList.add('open');
    initFilterBar();
    renderGrid();
  }

  /* ── Filter bar (category chips) ── */
  function initFilterBar(){
    const inner=document.getElementById('filterInner');
    const cats=[{key:'all',name:'All',icon:'✨'},...SECTIONS.map(s=>({key:s.key,name:s.name,icon:s.icon}))];
    inner.innerHTML=cats.map(c=>`
      <button class="f-chip${filters.category===c.key?' active':''}" onclick="APP.setCat('${c.key}')">
        ${c.icon} ${c.name}
      </button>`).join('');
  }

  function setCat(key){
    filters.category=key;
    document.querySelectorAll('.f-chip').forEach(c=>{
      c.classList.toggle('active', c.textContent.trim().startsWith(
        key==='all'?'✨':SECTIONS.find(s=>s.key===key)?.icon||''));
    });
    // easier: just re-init
    initFilterBar();
    renderGrid();
    updateActiveFiltersBar();
  }

  /* ── Search ── */
  function onSearch(val){
    filters.search=val.toLowerCase().trim();
    document.getElementById('sClear').classList.toggle('show',val.length>0);
    renderGrid();
    updateActiveFiltersBar();
  }

  function clearSearch(){
    filters.search='';
    document.getElementById('globalSearch').value='';
    document.getElementById('sClear').classList.remove('show');
    renderGrid();
    updateActiveFiltersBar();
  }

  /* ── Sort ── */
  function onSort(val){
    filters.sort=val;
    renderGrid();
  }

  /* ── Get filtered+sorted items ── */
  function getFilteredItems(){
    let items=[...ALL_ITEMS];

    // category
    if(filters.category!=='all') items=items.filter(i=>i.section===filters.category);

    // search
    if(filters.search) items=items.filter(i=>
      i.name.toLowerCase().includes(filters.search)||
      i.desc.toLowerCase().includes(filters.search)||
      i.sectionName.toLowerCase().includes(filters.search)
    );

    // tags
    if(filters.tags.includes('v')) items=items.filter(i=>i.tags.includes('v'));
    if(filters.tags.includes('popular')) items=items.filter(i=>i.tags.includes('popular'));
    if(filters.tags.includes('spicy')) items=items.filter(i=>i.tags.includes('spicy'));

    // price
    items=items.filter(i=>i.price<=filters.maxPrice);

    // sort
    switch(filters.sort){
      case 'price-asc':  items.sort((a,b)=>a.price-b.price); break;
      case 'price-desc': items.sort((a,b)=>b.price-a.price); break;
      case 'alpha':      items.sort((a,b)=>a.name.localeCompare(b.name)); break;
      case 'popular':    items.sort((a,b)=>(b.tags.includes('popular')?1:0)-(a.tags.includes('popular')?1:0)); break;
    }
    return items;
  }

  /* ── Render grid ── */
  function renderGrid(){
    const items=getFilteredItems();
    const grid=document.getElementById('shopGrid');
    document.getElementById('resultsCount').innerHTML=`<strong>${items.length}</strong> item${items.length!==1?'s':''}`;

    if(!items.length){
      grid.innerHTML=`<div class="no-results">
        <div class="no-results-icon">🔍</div>
        <h3>No items found</h3>
        <p>Try adjusting your search or filters</p>
        <button onclick="APP.clearAllFilters()">Clear Filters</button>
      </div>`;
      return;
    }

    grid.innerHTML=items.map(item=>buildCard(item)).join('');
  }

  function buildCard(item){
    const qty=cart[item.id]?.qty||0;
    const isFav=favs.has(item.id);
    const inCart=qty>0;

    const tags=item.tags.map(t=>{
      if(t==='v') return '<span class="ptag ptag-v">Veg</span>';
      if(t==='popular') return '<span class="ptag ptag-popular">Popular</span>';
      if(t==='spicy') return '<span class="ptag ptag-spicy">Spicy</span>';
      return '';
    }).join('');

    const ctrlHtml=qty>0
      ?`<div class="pc-qty-row">
          <button class="qbtn" onclick="APP.qty('${item.id}',-1,event)">−</button>
          <span class="qnum">${qty}</span>
          <button class="qbtn add" onclick="APP.qty('${item.id}',1,event)">+</button>
        </div>`
      :`<button class="pc-add" onclick="APP.qty('${item.id}',1,event)">+</button>`;

    return `<div class="product-card${inCart?' in-cart':''}" id="pc-${item.id}">
      <div class="pc-img" onclick="APP.openQV('${item.id}')">
        ${item.sectionIcon}
        ${item.tags.includes('popular')?'<span class="popular-badge">★ Popular</span>':''}
        ${item.tags.includes('spicy')?'<span class="spicy-badge">🌶</span>':''}
        <div class="in-cart-dot"></div>
        <button class="fav-btn${isFav?' active':''}" onclick="APP.toggleFav('${item.id}',event)">${isFav?'❤️':'🤍'}</button>
      </div>
      <div class="pc-body" onclick="APP.openQV('${item.id}')">
        <div class="pc-category">${item.sectionName}</div>
        <div class="pc-name">${item.name}</div>
        ${item.desc?`<div class="pc-desc">${item.desc}</div>`:''}
        <div class="pc-tags">${tags}</div>
      </div>
      <div class="pc-footer">
        <div class="pc-price">${fmt(item.price)}</div>
        <div id="pctrl-${item.id}">${ctrlHtml}</div>
      </div>
    </div>`;
  }

  /* ── Patch card control (safe, no outerHTML) ── */
  function patchCard(id){
    const ctrl=document.getElementById('pctrl-'+id);
    if(!ctrl) return;
    const qty=cart[id]?.qty||0;
    const card=document.getElementById('pc-'+id);
    if(card){
      card.classList.toggle('in-cart',qty>0);
      const nm=card.querySelector('.pc-name');
      if(nm) nm.style.color=qty>0?'var(--green)':'';
    }
    ctrl.innerHTML=qty>0
      ?`<div class="pc-qty-row">
          <button class="qbtn" onclick="APP.qty('${id}',-1,event)">−</button>
          <span class="qnum">${qty}</span>
          <button class="qbtn add" onclick="APP.qty('${id}',1,event)">+</button>
        </div>`
      :`<button class="pc-add" onclick="APP.qty('${id}',1,event)">+</button>`;
  }

  /* ── Qty ── */
  function qty(id,delta,event){
    if(event){event.preventDefault();event.stopPropagation();}
    const item=findItem(id); if(!item) return;
    if(!cart[id]) cart[id]={...item,qty:0};
    cart[id].qty=Math.max(0,cart[id].qty+delta);
    if(cart[id].qty===0) delete cart[id];
    if(delta>0) showToast(item.name+' added');
    patchCard(id);
    updateBadges();
    if(document.getElementById('page-order').classList.contains('active')) renderOrderPage();
  }

  /* ── Favourites ── */
  function toggleFav(id,event){
    if(event){event.preventDefault();event.stopPropagation();}
    const item=findItem(id); if(!item) return;
    if(favs.has(id)){
      favs.delete(id);
      showToast('Removed from saved');
    } else {
      favs.add(id);
      showToast(item.name+' saved ❤️');
    }
    // patch heart in current card
    const card=document.getElementById('pc-'+id);
    if(card){
      const btn=card.querySelector('.fav-btn');
      if(btn){btn.textContent=favs.has(id)?'❤️':'🤍';btn.classList.toggle('active',favs.has(id));}
    }
    updateBadges();
    if(document.getElementById('page-favs').classList.contains('active')) renderFavs();
  }

  function renderFavs(){
    const grid=document.getElementById('favsGrid');
    if(!favs.size){
      grid.innerHTML=`<div class="favs-empty" style="grid-column:1/-1">
        <div class="favs-empty-icon">🤍</div>
        <h3>No saved items yet</h3>
        <p>Tap the ❤️ on any item to save it here.</p>
      </div>`;
      return;
    }
    const items=ALL_ITEMS.filter(i=>favs.has(i.id));
    grid.innerHTML=items.map(i=>buildCard(i)).join('');
  }

  /* ── Active filters bar ── */
  function updateActiveFiltersBar(){
    const bar=document.getElementById('activeFilters');
    const tags=document.getElementById('activeFilterTags');
    const active=[];
    if(filters.category!=='all') active.push({label:'Category: '+SECTIONS.find(s=>s.key===filters.category)?.name,key:'cat'});
    if(filters.search) active.push({label:'Search: "'+filters.search+'"',key:'search'});
    if(filters.tags.includes('v')) active.push({label:'Vegetarian',key:'v'});
    if(filters.tags.includes('popular')) active.push({label:'Popular',key:'popular'});
    if(filters.tags.includes('spicy')) active.push({label:'Spicy',key:'spicy'});
    if(filters.maxPrice<500) active.push({label:'Under R'+filters.maxPrice,key:'price'});

    bar.classList.toggle('show',active.length>0);
    tags.innerHTML=active.map(a=>`
      <div class="af-tag">${a.label}
        <button onclick="APP.removeFilter('${a.key}')">×</button>
      </div>`).join('');
  }

  function removeFilter(key){
    if(key==='cat'){filters.category='all';initFilterBar();}
    else if(key==='search'){clearSearch();}
    else if(key==='v'||key==='popular'||key==='spicy') filters.tags=filters.tags.filter(t=>t!==key);
    else if(key==='price') filters.maxPrice=500;
    renderGrid();
    updateActiveFiltersBar();
  }

  function clearAllFilters(){
    filters={category:'all',tags:[],maxPrice:500,sort:'default',search:''};
    document.getElementById('globalSearch').value='';
    document.getElementById('sClear').classList.remove('show');
    document.getElementById('sortSelect').value='default';
    initFilterBar();
    renderGrid();
    updateActiveFiltersBar();
  }

  /* ── Filter Drawer ── */
  function openDrawer(){
    drawerDraft={...filters,tags:[...filters.tags]};
    renderDrawer();
    document.getElementById('filterDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
  }

  function closeDrawer(){
    document.getElementById('filterDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }

  function renderDrawer(){
    const maxP=ALL_ITEMS.reduce((m,i)=>Math.max(m,i.price),0);
    const body=document.getElementById('fdBody');
    body.innerHTML=`
      <div class="fd-section">
        <div class="fd-section-title">Category</div>
        <div class="fd-chips">
          <div class="fd-chip${drawerDraft.category==='all'?' active':''}" onclick="APP.draftCat('all')">All</div>
          ${SECTIONS.map(s=>`<div class="fd-chip${drawerDraft.category===s.key?' active':''}" onclick="APP.draftCat('${s.key}')">${s.icon} ${s.name}</div>`).join('')}
        </div>
      </div>

      <div class="fd-section">
        <div class="fd-section-title">Dietary & Tags</div>
        <div class="fd-chips">
          <div class="fd-chip${drawerDraft.tags.includes('v')?' active':''}" onclick="APP.draftTag('v')">🥦 Vegetarian</div>
          <div class="fd-chip${drawerDraft.tags.includes('popular')?' active':''}" onclick="APP.draftTag('popular')">⭐ Popular</div>
          <div class="fd-chip${drawerDraft.tags.includes('spicy')?' active':''}" onclick="APP.draftTag('spicy')">🌶 Spicy</div>
        </div>
      </div>

      <div class="fd-section">
        <div class="fd-section-title">Max Price</div>
        <div class="price-range-wrap">
          <div class="price-labels">
            <span>R0</span>
            <span>Up to <strong id="priceDisplay">R${drawerDraft.maxPrice}</strong></span>
            <span>R${maxP}</span>
          </div>
          <input type="range" id="priceRange" min="10" max="${maxP}" step="5" value="${drawerDraft.maxPrice}"
            oninput="APP.draftPrice(this.value)">
          <div class="price-presets">
            <div class="pp-btn${drawerDraft.maxPrice<=50?' active':''}" onclick="APP.draftPrice(50)">Under R50</div>
            <div class="pp-btn${drawerDraft.maxPrice<=100?' active':''}" onclick="APP.draftPrice(100)">Under R100</div>
            <div class="pp-btn${drawerDraft.maxPrice<=150?' active':''}" onclick="APP.draftPrice(150)">Under R150</div>
            <div class="pp-btn${drawerDraft.maxPrice>=500?' active':''}" onclick="APP.draftPrice(500)">Any price</div>
          </div>
        </div>
      </div>

      <div class="fd-section">
        <div class="fd-section-title">Sort By</div>
        <div class="fd-chips">
          ${[['default','Default'],['price-asc','Price ↑'],['price-desc','Price ↓'],['alpha','A→Z'],['popular','Popular First']].map(([v,l])=>
            `<div class="fd-chip${drawerDraft.sort===v?' active':''}" onclick="APP.draftSort('${v}')">${l}</div>`
          ).join('')}
        </div>
      </div>`;
  }

  function draftCat(key){
    drawerDraft.category=key;
    document.querySelectorAll('#fdBody .fd-chips:first-of-type .fd-chip, #fdBody .fd-section:first-child .fd-chip').forEach(c=>{
      c.classList.remove('active');
    });
    renderDrawer();
  }

  function draftTag(tag){
    drawerDraft.tags=drawerDraft.tags.includes(tag)?drawerDraft.tags.filter(t=>t!==tag):[...drawerDraft.tags,tag];
    renderDrawer();
  }

  function draftPrice(val){
    drawerDraft.maxPrice=parseInt(val);
    const el=document.getElementById('priceDisplay');
    const range=document.getElementById('priceRange');
    if(el) el.textContent='R'+val;
    if(range) range.value=val;
    renderDrawer();
  }

  function draftSort(val){
    drawerDraft.sort=val;
    renderDrawer();
  }

  function applyDrawer(){
    filters={...drawerDraft,tags:[...drawerDraft.tags]};
    document.getElementById('sortSelect').value=filters.sort;
    initFilterBar();
    renderGrid();
    updateActiveFiltersBar();
    closeDrawer();
  }

  function resetDrawer(){
    drawerDraft={category:'all',tags:[],maxPrice:500,sort:'default',search:filters.search};
    renderDrawer();
  }

  /* ── Quick View ── */
  function openQV(id){
    const item=findItem(id); if(!item) return;
    const qty=cart[id]?.qty||0;
    const isFav=favs.has(id);

    const tags=item.tags.map(t=>{
      if(t==='v') return '<span class="ptag ptag-v">Vegetarian</span>';
      if(t==='popular') return '<span class="ptag ptag-popular">★ Popular</span>';
      if(t==='spicy') return '<span class="ptag ptag-spicy">🌶 Spicy</span>';
      return '';
    }).join('');

    const ctrlHtml=qty>0
      ?`<div class="qv-add-row">
          <button class="qbtn" onclick="APP.qty('${id}',-1)">−</button>
          <span class="qnum" style="font-size:16px;min-width:22px">${qty}</span>
          <button class="qbtn add" onclick="APP.qty('${id}',1)">+</button>
        </div>`
      :`<button class="qv-add-btn" onclick="APP.qty('${id}',1)">Add to Order</button>`;

    document.getElementById('qvModal').innerHTML=`
      <div class="qv-handle"></div>
      <div class="qv-img">
        ${item.sectionIcon}
        <button class="fav-btn${isFav?' active':''}" style="top:10px;right:10px;width:34px;height:34px;font-size:16px" onclick="APP.toggleFav('${id}',event)">${isFav?'❤️':'🤍'}</button>
      </div>
      <div class="qv-body">
        <div class="qv-cat">${item.sectionName}</div>
        <div class="qv-name">${item.name}</div>
        ${item.desc?`<div class="qv-desc">${item.desc}</div>`:''}
        ${item.note?`<div class="qv-note">ℹ️ ${item.note}</div>`:''}
        <div class="qv-tags">${tags}</div>
        <div class="qv-price-row">
          <div class="qv-price">${fmt(item.price)}</div>
          <div id="qvctrl-${id}">${ctrlHtml}</div>
        </div>
      </div>`;

    document.getElementById('qvOverlay').classList.add('open');
    document.getElementById('qvModal').classList.add('open');
  }

  function closeQV(){
    document.getElementById('qvOverlay').classList.remove('open');
    document.getElementById('qvModal').classList.remove('open');
  }

  /* ── Badges ── */
  function updateBadges(){
    const n=cartCount();
    const fb=favs.size;
    document.getElementById('cartBadge').textContent=n;
    document.getElementById('cartBadge').classList.toggle('show',n>0);
    document.getElementById('shCartCount').textContent=n;
    document.getElementById('favsBadge').textContent=fb;
    document.getElementById('favsBadge').classList.toggle('show',fb>0);
  }

  /* ── Tab ── */
  function tab(key,btn){
    if(key==='order') renderOrderPage();
    if(key==='favs') renderFavs();
    showPage(key);
    activateTab(key);
  }

  /* ── Order Page ── */
  function renderOrderPage(){
    const items=Object.values(cart);
    const count=cartCount(),total=cartTotal();
    document.getElementById('orderCountLabel').textContent=count>0?count+' item'+(count!==1?'s':''):'';
    const wrap=document.getElementById('orderWrap');
    if(!items.length){
      wrap.innerHTML=`<div class="order-empty">
        <div class="order-empty-icon">🛒</div>
        <h3>Your order is empty</h3>
        <p>Browse the menu and add your favourite items.</p>
        <button class="btn-ghost" onclick="APP.tab('shop',document.getElementById('tab-shop'))">Browse Menu</button>
      </div>`;return;
    }
    wrap.innerHTML=`
      <div class="save-form-card">
        <div class="sfc-title">Order Details</div>
        <div class="form-row"><label class="form-label">Your Name</label>
          <input class="form-input" id="guestName" type="text" placeholder="e.g. Sarah" maxlength="40" autocomplete="off"></div>
        <div class="form-row"><label class="form-label">Table Number</label>
          <input class="form-input" id="tableNum" type="text" placeholder="e.g. 5" maxlength="10" autocomplete="off"></div>
        <div class="form-row"><label class="form-label">Special Requests</label>
          <input class="form-input" id="specialReq" type="text" placeholder="Allergies, preferences…" maxlength="100" autocomplete="off"></div>
      </div>
      <div class="order-lines-card">
        ${items.map(item=>`
          <div class="order-line">
            <div class="ol-emoji">${item.sectionIcon}</div>
            <div class="ol-info">
              <div class="ol-name">${item.name}</div>
              <div class="ol-unit">${fmt(item.price)} each</div>
            </div>
            <div class="pc-qty-row">
              <button class="qbtn" onclick="APP.qty('${item.id}',-1)">−</button>
              <span class="qnum">${item.qty}</span>
              <button class="qbtn add" onclick="APP.qty('${item.id}',1)">+</button>
            </div>
            <div class="ol-sub">${fmt(item.price*item.qty)}</div>
          </div>`).join('')}
      </div>
      <div class="totals-card">
        <div class="total-row"><span>Subtotal (${count} item${count!==1?'s':''})</span><span>${fmt(total)}</span></div>
        <div class="total-grand"><span>Total</span><span>${fmt(total)}</span></div>
      </div>
      <div class="actions-row">
        <button class="btn-primary" onclick="APP.placeOrder()">Place Order →</button>
        <button class="btn-danger" onclick="APP.clearOrder()">🗑 Clear Entire Order</button>
      </div>`;
  }

  function clearOrder(){
    if(!Object.keys(cart).length) return;
    if(!confirm('Clear your entire order?')) return;
    cart={};
    updateBadges();
    renderGrid();
    renderOrderPage();
    showToast('Order cleared');
  }

  function placeOrder(){
    const items=Object.values(cart); if(!items.length) return;
    const gName=(document.getElementById('guestName')?.value||'').trim();
    const tNum=(document.getElementById('tableNum')?.value||'').trim();
    const sReq=(document.getElementById('specialReq')?.value||'').trim();
    const total=cartTotal(),count=cartCount();
    const now=new Date();
    const dateStr=now.toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'});
    const timeStr=now.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});
    const orderNo='SH-'+Math.floor(1000+Math.random()*9000);
    const customerLine=[gName&&'Name: '+gName,tNum&&'Table: '+tNum].filter(Boolean).join(' · ');
    const reqLine=sReq?`<div style="font-size:11px;color:var(--ink3);margin-top:4px;font-style:italic;">Note: ${sReq}</div>`:'';

    document.getElementById('receiptWrap').innerHTML=`
      <div class="receipt-paper">
        <div class="receipt-foil"></div>
        <div class="receipt-head">
          <div class="r-logo">Stone<em>house</em></div>
          <span class="r-est">The Café · Hillcrest · Est. 2019</span>
          <div class="r-divider"></div>
          <div class="r-order-no">${orderNo}</div>
          <div class="r-datetime">${dateStr} · ${timeStr}</div>
          ${customerLine?`<div class="r-customer">${customerLine}</div>`:''}
          ${reqLine}
        </div>
        <div class="receipt-items">
          <div class="r-col-head"><span>Item</span><span>Qty</span><span>Amount</span></div>
          ${items.map(i=>`<div class="r-item">
            <div class="r-iname">${i.name}</div>
            <div class="r-iqty">×${i.qty}</div>
            <div class="r-iamt">${fmt(i.price*i.qty)}</div>
          </div>`).join('')}
        </div>
        <div class="receipt-total">
          <div class="r-trow"><span>${count} item${count!==1?'s':''}</span><span>${fmt(total)}</span></div>
          <div class="r-grand"><span>Total</span><span>${fmt(total)}</span></div>
        </div>
        <div class="receipt-foot">
          <p>Thank you for dining with us.<br>We look forward to seeing you again!</p>
          <span class="receipt-hashtag">#GOODFORKIDS · #SERVICEWITHSMILE</span>
        </div>
      </div>
      <div class="receipt-tear"></div>
      <div class="counter-box">
        <div class="cb-icon">🧾</div>
        <h3>Please take your order to the counter</h3>
        <p>Show this slip to our team and confirm your order.<br>We'll get it started right away!</p>
      </div>
      <button class="btn-new-order" onclick="APP.newOrder()">Start New Order</button>`;

    showPage('receipt');
    document.querySelectorAll('.tb-item').forEach(t=>t.classList.remove('active'));
  }

  function newOrder(){
    cart={};
    updateBadges();
    renderGrid();
    tab('shop',document.getElementById('tab-shop'));
  }

  return{openMenu,onSearch,clearSearch,onSort,setCat,openDrawer,closeDrawer,
         draftCat,draftTag,draftPrice,draftSort,applyDrawer,resetDrawer,
         openQV,closeQV,qty,toggleFav,removeFilter,clearAllFilters,
         tab,clearOrder,placeOrder,newOrder};
})();
</script>
</body>
</html>
